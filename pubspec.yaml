name: flutter_learning_jorney
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  go_router: ^17.2.3
  flutter_bloc: ^9.1.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: SilpoText
      fonts:
        - asset: assets/fonts/SilpoText-Regular.ttf
        - asset: assets/fonts/SilpoText-Medium.ttf
        - asset: assets/fonts/SilpoText-Bold.ttf
        - asset: assets/fonts/SilpoText-SemiBold.ttf
        - asset: assets/fonts/SilpoText-ExtraBold.ttf
